<style>

    --serif:"Georgia","Cambria",serif;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 10px 30px rgba(0,0,0,.07);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55}
  header.top{display:flex;align-items:center;gap:14px;padding:12px 22px;background:var(--white);border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:20;flex-wrap:wrap}
  header .logo{display:flex;align-items:center;gap:10px}
  header .logo svg,header .logo img{height:30px;width:auto;display:block}
  header .logo .wm{font-weight:800;font-size:14px}
  header .logo .wm .o{color:var(--cima)} header .logo .wm small{display:block;font-weight:700;font-size:11px;color:var(--slate)}
  header .title{font-family:var(--serif);font-size:15px;color:var(--slate);margin-left:4px}
  header .prog{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--slate)}
  header .pbar{width:150px;height:8px;background:var(--paper2);border-radius:6px;overflow:hidden}
  header .pbar>i{display:block;height:100%;background:var(--cima);width:0;transition:width .3s}
  .shell{display:grid;grid-template-columns:280px 1fr;gap:0;min-height:calc(100vh - 56px)}
  @media(max-width:860px){.shell{grid-template-columns:1fr}.side{position:static!important;height:auto!important}}
  /* sidebar */
  .side{background:var(--white);border-right:1px solid var(--rule);padding:16px 12px;position:sticky;top:56px;height:calc(100vh - 56px);overflow:auto}
  .side h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--cima);margin:6px 8px 10px}
  .moditem{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;margin-bottom:3px}
  .moditem:hover{background:var(--paper2)}
  .moditem.active{background:var(--peach)}
  .modnum{width:26px;height:26px;border-radius:7px;background:var(--paper2);color:var(--slate);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .moditem.active .modnum{background:var(--cima);color:#fff}
  .moditem.done .modnum{background:var(--green);color:#fff}
  .moditem .mt{font-size:13px;font-weight:600;line-height:1.2}
  .moditem .ms{font-size:11px;color:var(--slate)}

  main{padding:26px 34px 90px;max-width:900px}

  h1.mod{font-family:var(--serif);font-size:30px;margin:6px 0 2px}
  .modsub{color:var(--cima-d);font-style:italic;font-family:var(--serif);font-size:16px;margin-bottom:18px}
  .sec{background:var(--white);border:1px solid var(--rule);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
  .sec h3{margin:0 0 10px;font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--cima)}
  .sec p{margin:0 0 10px;font-size:15px}
  .obj{display:flex;gap:10px;align-items:flex-start;margin:7px 0;font-size:15px}
  .obj .b{width:20px;height:20px;border-radius:6px;background:var(--cima);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:1px}
  .concept{margin:0 0 12px}
  .concept b{color:var(--ink)}
  /* video */
  .video{background:#141210;border-radius:12px;padding:28px;text-align:center;color:#fff;border:1px dashed #4a453f}
  .video .play{width:52px;height:52px;border-radius:50%;background:var(--cima);display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px}

  .video .vd{font-size:12.5px;color:#b8b2a8;margin-top:4px}

  .mirada{display:none;margin-top:10px;background:var(--cream);border-left:3px solid var(--cima);border-radius:0 10px 10px 0;padding:12px 14px;font-size:14px}

  .reveal-btn{background:none;border:1px solid var(--cima);color:var(--cima-d);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}

  textarea{width:100%;border:1px solid var(--rule);border-radius:10px;padding:11px 13px;font-family:var(--sans);font-size:14px;min-height:96px;resize:vertical}
  .saved{font-size:12px;color:var(--green);margin-top:6px;display:none}
  /* quiz */
  .qq{margin-bottom:16px}
  .qq .q{font-weight:700;font-size:14.5px;margin-bottom:8px}
  .qexp{font-size:13px;color:var(--slate);margin-top:4px;display:none}
  .qexp.show{display:block}
  /* footer nav */
  .navbar{display:flex;gap:10px;align-items:center;margin-top:20px}
  .btn{border:1px solid var(--rule);background:var(--white);border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;color:var(--ink)}
  .btn.primary{background:var(--cima);color:#fff;border-color:var(--cima)}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.done{background:var(--green);border-color:var(--green);color:#fff}
  .spacer{flex:1}
  .tag{display:inline-block;font-size:11px;font-weight:700;color:var(--cima);background:var(--peach);border-radius:20px;padding:3px 10px;margin-bottom:8px}
  .final{text-align:center;padding:40px 20px}

  @media(max-width:560px){

    main{padding:18px 14px 72px}
    h1.mod{font-size:24px}
    .sec{padding:15px 15px}
    .video{padding:20px}

</style>
</head>

const LOGO_SVG=`<img src="logo-cima-naranja.png" alt="CIMA Leadership Institute">`;
document.getElementById("brandLogo").innerHTML=LOGO_SVG;

/* ===================== ACCESO DE COACHES (Supabase) =====================
   Cuentas individuales por coach. Pasos:
   1) Crea un proyecto gratis en https://supabase.com
   2) En el proyecto: Settings → API. Copia "Project URL" y la key "anon public".
   3) Pégalas abajo en SUPABASE_URL y SUPABASE_ANON_KEY.
   4) Da de alta a cada coach en: Authentication → Users → Add user
      (correo + contraseña). Ahí también puedes eliminar o resetear a cualquiera.
   5) Recomendado: Authentication → Providers → Email → desactiva "Allow new users
      to sign up", para que SOLO tú puedas crear coaches.

   Mientras NO pegues tus datos de Supabase, el Aula sigue usando la contraseña
   temporal (cima2026) para no bloquear el acceso. Al pegarlos, cambia automática-
   mente a login por cuenta individual.
======================================================================= */
const SUPABASE_URL      = "https://siaykigdlgnjjcklxaoc.supabase.co";   // Project URL de CIMA
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpYXlraWdkbGduampja2x4YW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODQzNDAsImV4cCI6MjA5NzQ2MDM0MH0.oVYu-aANUbtyK3TnsFijDs9z-ql7SLrl_sp-SBzWTiI";  // anon public key

const SB_READY = !SUPABASE_URL.includes("TU-PROYECTO") && !SUPABASE_ANON_KEY.includes("TU_ANON");
let sb = null;
if (SB_READY && window.supabase) { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }

const gateEmail = document.getElementById("gateEmail");
const gateSub   = document.getElementById("gateSub");
if (SB_READY) {
  if (gateSub) gateSub.textContent = "Módulo privado · acceso con tu cuenta de coach";
} else {
  if (gateEmail) gateEmail.style.display = "none";
  if (gateSub)  gateSub.textContent = "Módulo privado · acceso con contraseña";
}

/* Fallback temporal por contraseña (solo si Supabase aún no está configurado) */
const PASSWORD_HASH="b4a9cf1d3a9e8d2b76a197094d9742c274dabe27d1a5f569ff8dbaef5830938c"; // = sha256("cima2026")
async function sha256(s){const b=new TextEncoder().encode(s);const h=await crypto.subtle.digest("SHA-256",b);return [...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,"0")).join("");}

function hideGate(){ document.getElementById("gate").style.display="none"; }

async function tryLogin(){
  const err=document.getElementById("gateErr");
  const pass=document.getElementById("gatePass").value;
  if (SB_READY && sb) {
    const email=(gateEmail.value||"").trim();
    if(!email||!pass){ err.textContent="Escribe tu correo y contraseña."; return; }
    err.textContent="Entrando…";
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { err.textContent="Correo o contraseña incorrectos."; return; }
    err.textContent=""; hideGate();
  } else {
    try{
      const h=await sha256(pass);
      if(h===PASSWORD_HASH){ try{sessionStorage.setItem("cima_aula_ok","1");}catch(e){} hideGate(); }
      else { err.textContent="Contraseña incorrecta."; }
    }catch(e){ err.textContent="El acceso funciona en el sitio publicado (https)."; }
  }
}

async function cerrarSesion(){
  try{ if (SB_READY && sb) await sb.auth.signOut(); }catch(e){}
  try{ sessionStorage.removeItem("cima_aula_ok"); }catch(e){}
  location.reload();
}

document.getElementById("gateLogo").innerHTML=LOGO_SVG;
document.getElementById("gatePass").addEventListener("keydown",e=>{ if(e.key==="Enter") tryLogin(); });
if (gateEmail) gateEmail.addEventListener("keydown",e=>{ if(e.key==="Enter") tryLogin(); });

(async function initGate(){
  if (SB_READY && sb) {
    try{ const { data } = await sb.auth.getSession(); if (data && data.session) hideGate(); }catch(e){}
  } else {
    try{ if(sessionStorage.getItem("cima_aula_ok")==="1") hideGate(); }catch(e){}
  }
})();

/* ===================== TUS VIDEOS =====================
   Pega el enlace de cada módulo entre las comillas (índice 0 a 8).
   Sirve YouTube, Vimeo o un archivo .mp4 directo.
   Deja "" (vacío) para mostrar el marcador "por grabar".
   Ejemplo:  0:"https://youtu.be/AbCdEf12345",
====================================================== */
const VIDEOS={
  0:"",
  1:"",
  2:"",
  3:"",
  4:"",
  5:"",
  6:"",
  7:"",
  8:""
};
function videoEmbed(i,v){
  const url=(VIDEOS[i]||"").trim();
  if(!url){
    return `<div class="video"><div class="play"><svg width="20" height="20" viewBox="0 0 20 20" fill="#fff"><path d="M5 3l12 7-12 7z"/></svg></div><div class="vt">${v.t}</div><div class="vd">${v.d}</div></div>`;
  }
  const yt=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
  const vm=url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(/\.(mp4|webm|ogg)(\?|#|$)/i.test(url)) return `<div class="videowrap"><video controls src="${url}"></video></div>`;
  let src=url;
  if(yt) src="https://www.youtube.com/embed/"+yt[1];
  else if(vm) src="https://player.vimeo.com/video/"+vm[1];
  return `<div class="videowrap"><iframe src="${src}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe></div>`;
}

       {q:"El Mapa de Brechas mide…",ops:["El talento del equipo.","La diferencia entre cómo se ve la persona y cómo la ven.","La rentabilidad."],c:1,e:"Esa brecha es una medida de conciencia."}]},

// ---------- state ----------
const KEY="cima_course_v1";
let state={mod:0,done:{},reflex:{}};
try{const s=localStorage.getItem(KEY); if(s) state=Object.assign(state,JSON.parse(s));}catch(e){}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

function progress(){const d=Object.keys(state.done).filter(k=>state.done[k]).length; return Math.round(d/COURSE.length*100);}
function renderProgress(){const p=progress(); document.getElementById("progTxt").textContent=p+"%"; document.getElementById("pbar").style.width=p+"%";}

function renderSidebar(){
  const sb=document.getElementById("sidebar"); sb.innerHTML="";
  COURSE.forEach((m,i)=>{
    const el=document.createElement("div");
    el.className="moditem"+(i===state.mod?" active":"")+(state.done[i]?" done":"");
    el.innerHTML=`<div class="modnum">${state.done[i]?"✓":m.num}</div><div><div class="mt">${m.title}</div><div class="ms">Módulo ${m.num}</div></div>`;
    el.onclick=()=>{state.mod=i;save();renderAll();window.scrollTo(0,0);};
    sb.appendChild(el);
  });
}

function renderMain(){
  const m=COURSE[state.mod]; const main=document.getElementById("main");
  let html=`<div class="eyebrow">Módulo ${m.num}</div><h1 class="mod">${m.title}</h1><div class="modsub">"${m.sub}"</div>`;
  // objetivos
  html+=`<div class="sec"><h3>Objetivos de aprendizaje</h3>`+m.objetivos.map((o,i)=>`<div class="obj"><div class="b">${i+1}</div><div>${o}</div></div>`).join("")+`</div>`;
  // video
  html+=`<div class="sec"><h3>Video del módulo</h3>${videoEmbed(state.mod, m.video)}</div>`;
  // conceptos
  html+=`<div class="sec"><h3>Conceptos clave</h3>`+m.conceptos.map(c=>`<div class="concept"><b>${c.h}.</b> ${c.p}</div>`).join("")+`</div>`;
  // caso
  html+=`<div class="sec caso"><span class="tag">Caso práctico</span><div class="esc">${m.caso.esc}</div><div class="preg">${m.caso.preg}</div><div id="casoOpts">`+
    m.caso.ops.map((o,i)=>`<button class="opt" data-i="${i}" onclick="answerCaso(${i})">${o.t}</button>`).join("")+
    `</div><div class="fb" id="casoFb"></div><div class="mirada" id="casoMirada"><b>La mirada CIMA.</b> ${m.caso.mirada}</div></div>`;
  // reflexion
  const rv=state.reflex[state.mod]||"";
  html+=`<div class="sec"><h3>Ejercicio de reflexión</h3><p>${m.reflexion}</p><textarea id="reflex" placeholder="Escribe aquí… (se guarda solo)">${rv.replace(/</g,"&lt;")}</textarea><div class="saved" id="savedMsg">Guardado ✓</div></div>`;
  // quiz
  html+=`<div class="sec"><h3>Verificación de conocimiento</h3>`+m.quiz.map((q,qi)=>{
    return `<div class="qq"><div class="q">${qi+1}. ${q.q}</div>`+
      q.ops.map((o,oi)=>`<button class="opt" data-q="${qi}" data-o="${oi}" onclick="answerQuiz(${qi},${oi})">${o}</button>`).join("")+
      `<div class="qexp" id="qexp${qi}">${q.e}</div></div>`;
  }).join("")+`</div>`;
  // nav
  const isDone=!!state.done[state.mod];
  html+=`<div class="navbar">
     <button class="btn" onclick="go(-1)" ${state.mod===0?"disabled":""}>← Anterior</button>
     <button class="btn ${isDone?"done":"primary"}" onclick="complete()">${isDone?"Módulo completado ✓":"Marcar como completado"}</button>
     <div class="spacer"></div>
     <button class="btn" onclick="go(1)" ${state.mod===COURSE.length-1?"disabled":""}>Siguiente →</button>
  </div>`;
  main.innerHTML=html;
  // wire reflex autosave
  const ta=document.getElementById("reflex");
  if(ta){let t; ta.addEventListener("input",()=>{state.reflex[state.mod]=ta.value; clearTimeout(t); t=setTimeout(()=>{save(); const sm=document.getElementById("savedMsg"); sm.style.display="block"; setTimeout(()=>sm.style.display="none",1200);},400);});}
}
function answerCaso(i){
  const m=COURSE[state.mod]; const opts=document.querySelectorAll("#casoOpts .opt"); const o=m.caso.ops[i];
  opts.forEach((el,ix)=>{el.classList.add("dim"); el.onclick=null; if(m.caso.ops[ix].ok) el.classList.add("correct"); });
  opts[i].classList.remove("dim"); opts[i].classList.add(o.ok?"correct":"wrong");
  const fb=document.getElementById("casoFb"); fb.className="fb show "+(o.ok?"ok":"no"); fb.textContent=o.fb;
  document.getElementById("casoMirada").classList.add("show");
}
function answerQuiz(qi,oi){
  const m=COURSE[state.mod]; const q=m.quiz[qi];
  const opts=document.querySelectorAll(`#main .opt[data-q="${qi}"]`);
  opts.forEach((el,ix)=>{el.onclick=null; el.classList.add("dim"); if(ix===q.c) el.classList.add("correct");});
  opts[oi].classList.remove("dim"); opts[oi].classList.add(oi===q.c?"correct":"wrong");
  document.getElementById("qexp"+qi).classList.add("show");
}
function complete(){ state.done[state.mod]=true; save(); renderSidebar(); renderProgress();
  const allDone=Object.keys(state.done).filter(k=>state.done[k]).length===COURSE.length;
  if(state.mod<COURSE.length-1){ state.mod++; save(); renderAll(); window.scrollTo(0,0); }
  else { renderMain(); if(allDone) showFinal(); }
}
function go(d){ const n=state.mod+d; if(n>=0&&n<COURSE.length){state.mod=n;save();renderAll();window.scrollTo(0,0);} }
function showFinal(){
  document.getElementById("main").innerHTML=`<div class="final"><div class="tag">Curso completado</div><div class="big">Nos vemos en la cima.</div><p style="max-width:520px;margin:14px auto;color:var(--slate)">Terminaste los 9 módulos del aula. El siguiente paso de tu certificación es la práctica supervisada y la evaluación con un Maestro CIMA.</p><button class="btn primary" onclick="state.mod=0;save();renderAll();window.scrollTo(0,0)">Volver al inicio</button></div>`;
}
function renderAll(){ renderSidebar(); renderMain(); renderProgress(); }
renderAll();
</script>
